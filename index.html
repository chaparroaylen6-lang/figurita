<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Figuritas - La Scaloneta</title>
    <link rel="stylesheet" href="estilo.css">
    <link rel="icon" type="image/x-icon" href="https://upload.wikimedia.org/wikipedia/commons/a/a4/Sol_de_Mayo_Bandera_Argentina.png">
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.3.0/dist/browser/index.js"></script>
</head>
<body>

<header class="school-header">
    <div class="logos">
        <div class="logo-ies">
            <img src="https://ies7venadotuerto.edu.ar/wp-content/uploads/2019/09/logo.png" alt="Logo IES" class="logo-img">
        </div>
        <div class="logo-carrera">
            <img src="https://media-eze1-1.cdn.whatsapp.net/v/t61.24694-24/534419706_955235030178583_6412941059776622736_n.jpg?ccb=11-4&oh=01_Q5Aa4wELikqXu9hJtlV2_JwtJidvSYeO1GL7CcXsljSMioj7dg&oe=6A305967&_nc_sid=5e03e0&_nc_cat=107" alt="Logo Carrera" class="logo-img">
        </div>
    </div>
    <div class="presentation">
        <h1>Proyecto: Figurita Mundialista</h1>
        <p>Presentado por la carrera de desarrollo de software. Crea tu propia figurita de la selección con nuestra herramienta interactiva.</p>
    </div>
</header>

    <main class="container">
        <section class="controls-panel">
            <h2>Crea tu figurita</h2>
            
            <div class="photo-controls">
                <label class="btn-custom" for="imageUpload">📸 Subir Foto</label>
                <input type="file" id="imageUpload" accept="image/*" style="display: none;">
                
                <button class="btn-custom" id="cameraBtn">📷 Usar Cámara</button>
            </div>

            <div class="camera-container" id="cameraContainer" style="display: none;">
                <video id="cameraStream" autoplay playsinline></video>
                <button class="btn-custom btn-action" id="captureBtn">Capturar Foto</button>
            </div>

            <div id="loadingMsg" class="loading" style="display: none;">🤖 Recortando el fondo... Por favor espera.</div>

            <form id="dataForm" class="data-form">
                <input type="text" id="playerName" placeholder="NOMBRE APELLIDO (Ej: LIONEL MESSI)" required>
                <div class="row">
                    <input type="text" id="playerDob" placeholder="Fecha Nac. (01-09-1997)">
                    <input type="text" id="playerHeight" placeholder="Altura (1,78 m)">
                    <input type="text" id="playerWeight" placeholder="Peso (67 kg)">
                </div>
                <input type="text" id="playerTeam" value="LA SCALONETA (ARG)" readonly>
            </form>
        </section>

        <section class="preview-panel">
            <div class="canvas-container">
                <canvas id="stickerCanvas" width="500" height="700"></canvas>
            </div>
            <button class="btn-custom btn-download" id="downloadBtn" disabled>⬇️ Descargar Figurita</button>
        </section>
    </main>

    <footer>
        <p>© 2026 - Proyecto Escolar |ies 7 | Desarrollado con 🩵 y 🤍</p>
    </footer>

    <script src="java.js"></script>
</body>
</html>
